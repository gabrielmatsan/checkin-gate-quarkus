# Application
quarkus.application.name=checkin-gate

# HTTP
quarkus.http.port=${PORT:8080}
quarkus.http.cors=true
quarkus.http.cors.origins=*

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/checkingate}
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.min-size=2

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# JWT
mp.jwt.verify.publickey.location=publickey.pem
mp.jwt.verify.issuer=checkin-gate
smallrye.jwt.sign.key.location=privatekey.pem
smallrye.jwt.token.cookie=access_token
smallrye.jwt.token.schemes=Cookie,Bearer
smallrye.jwt.new-token.lifespan=900

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-url=${GOOGLE_REDIRECT_URL:http://localhost:8080/auth/google/callback}

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# Mailer (Resend via SMTP)
quarkus.mailer.host=smtp.resend.com
quarkus.mailer.port=587
quarkus.mailer.username=resend
quarkus.mailer.password=${RESEND_KEY:}
quarkus.mailer.from=${RESEND_FROM:noreply@checkingate.com}
quarkus.mailer.start-tls=REQUIRED

# OpenAPI
quarkus.smallrye-openapi.info-title=Checkin Gate API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Event check-in system with certificate generation

# Dev profile
%dev.quarkus.swagger-ui.always-include=true
%dev.quarkus.swagger-ui.path=/docs
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.mailer.mock=true
%dev.quarkus.log.category."com.checkingate".level=DEBUG

# Security - permit public endpoints
quarkus.http.auth.permission.public.paths=/auth/*,/q/health/*,/q/openapi,/q/swagger-ui/*,/docs
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated
