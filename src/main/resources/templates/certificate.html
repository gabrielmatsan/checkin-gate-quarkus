<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <style>
        @page {
            size: A4 landscape;
            margin: 0;
        }
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
        }
        .certificate {
            width: 100%;
            height: 100%;
            padding: 40px 60px;
            box-sizing: border-box;
            border: 8px solid #1a365d;
            position: relative;
        }
        .certificate::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 2px solid #d4a843;
        }
        .header {
            text-align: center;
            margin-top: 30px;
        }
        .title {
            font-size: 36px;
            color: #1a365d;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
            letter-spacing: 2px;
        }
        .divider {
            width: 200px;
            height: 2px;
            background-color: #d4a843;
            margin: 20px auto;
        }
        .body {
            text-align: center;
            margin-top: 30px;
        }
        .body p {
            font-size: 16px;
            color: #333;
            line-height: 1.8;
        }
        .recipient-name {
            font-size: 28px;
            font-weight: bold;
            color: #1a365d;
            margin: 15px 0;
        }
        .event-name {
            font-size: 20px;
            font-weight: bold;
            color: #d4a843;
        }
        .workload {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
        }
        .signatures {
            display: flex;
            justify-content: space-around;
            margin-top: 50px;
            padding: 0 80px;
        }
        .signature {
            text-align: center;
        }
        .signature-line {
            width: 200px;
            border-top: 1px solid #333;
            margin: 0 auto 5px;
        }
        .signature-name {
            font-size: 12px;
            color: #333;
            font-weight: bold;
        }
        .signature-title {
            font-size: 10px;
            color: #666;
        }
        .date {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="certificate">
        <div class="header">
            <div class="title">Certificado</div>
            <div class="subtitle">de Participacao</div>
            <div class="divider"></div>
        </div>
        <div class="body">
            <p>Certificamos que</p>
            <div class="recipient-name">{recipientName}</div>
            <p>participou do evento</p>
            <div class="event-name">{eventName}</div>
            <p>realizado em {eventDate}</p>
            <div class="workload">Carga horaria: {workload}</div>
        </div>
        <div class="signatures">
            <div class="signature">
                <div class="signature-line"></div>
                <div class="signature-name">{directorName}</div>
                <div class="signature-title">Diretor</div>
            </div>
            <div class="signature">
                <div class="signature-line"></div>
                <div class="signature-name">{coordinatorName}</div>
                <div class="signature-title">Coordenador</div>
            </div>
        </div>
        <div class="date">{certificateDate}</div>
    </div>
</body>
</html>
